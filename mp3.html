<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player de MP3</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f3f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container { width: 100%; max-width: 480px; }

    .drop-zone {
      border: 1.5px dashed #b4b2a9;
      border-radius: 12px;
      background: #f1efe8;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.5rem;
    }
    .drop-zone.drag-over { border-color: #7F77DD; background: #EEEDFE; }
    .drop-zone i { font-size: 32px; color: #888780; display: block; margin-bottom: 8px; }
    .drop-zone p { font-size: 14px; color: #5f5e5a; margin-bottom: 4px; }
    .drop-zone span { font-size: 12px; color: #888780; }

    .player-card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .now-playing { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
    .album-art {
      width: 52px; height: 52px; border-radius: 8px;
      background: linear-gradient(135deg, #7F77DD, #5DCAA5);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .album-art i { font-size: 24px; color: #fff; }
    .track-info { flex: 1; min-width: 0; }
    .track-name {
      font-size: 15px; font-weight: 500; color: #2c2c2a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
    }
    .track-meta { font-size: 12px; color: #888780; }

    .progress-area { margin-bottom: 1rem; }
    .times { display: flex; justify-content: space-between; font-size: 11px; color: #888780; margin-bottom: 4px; }

    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 2px;
      background: #d3d1c7; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #534AB7; cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: #534AB7; cursor: pointer; border: none;
    }

    .controls { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 1rem; }
    .ctrl-btn {
      background: none; border: none; cursor: pointer; padding: 8px;
      border-radius: 50%; color: #888780;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .ctrl-btn:hover { background: #f1efe8; color: #2c2c2a; }
    .ctrl-btn i { font-size: 20px; }

    .play-btn {
      background: #534AB7; color: #fff; width: 48px; height: 48px;
      border: none; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .play-btn:hover { background: #7F77DD; }
    .play-btn:active { transform: scale(0.96); }
    .play-btn i { font-size: 22px; }

    .volume-row { display: flex; align-items: center; gap: 8px; }
    .volume-row i { font-size: 16px; color: #888780; }
    .vol-bar { flex: 1; }

    .playlist { margin-top: 1rem; }
    .playlist-header {
      font-size: 12px; font-weight: 500; color: #888780;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 8px; padding: 0 4px;
    }
    .playlist-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    .playlist-item:hover { background: #f1efe8; }
    .playlist-item.active { background: #EEEDFE; }
    .playlist-item.active .item-name { color: #534AB7; font-weight: 500; }
    .item-num { font-size: 12px; color: #888780; width: 18px; text-align: center; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; color: #2c2c2a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-dur { font-size: 12px; color: #888780; flex-shrink: 0; }
    .item-remove {
      background: none; border: none; cursor: pointer; color: #888780;
      padding: 4px; border-radius: 4px; opacity: 0; transition: opacity 0.15s;
    }
    .playlist-item:hover .item-remove { opacity: 1; }
    .item-remove:hover { color: #E24B4A; }

    .empty-state { text-align: center; padding: 2rem 0; color: #888780; font-size: 14px; }
    .empty-state i { font-size: 28px; display: block; margin-bottom: 8px; }

    .active-icon { color: #534AB7 !important; }
  </style>
</head>
<body>

<div class="container">

  <div class="drop-zone" id="dropZone">
    <i class="ti ti-music"></i>
    <p>Arraste arquivos MP3 aqui</p>
    <span>ou clique para selecionar</span>
    <input type="file" id="fileInput" accept="audio/*" multiple style="display:none">
  </div>

  <div class="player-card">
    <div class="now-playing">
      <div class="album-art">
        <i class="ti ti-music"></i>
      </div>
      <div class="track-info">
        <div class="track-name" id="trackName">Nenhuma música carregada</div>
        <div class="track-meta" id="trackMeta">—</div>
      </div>
    </div>

    <div class="progress-area">
      <div class="times">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
      <input type="range" id="progressBar" min="0" max="100" value="0" step="0.1">
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="shuffleBtn" title="Aleatório">
        <i class="ti ti-arrows-shuffle"></i>
      </button>
      <button class="ctrl-btn" id="prevBtn" title="Anterior">
        <i class="ti ti-player-skip-back"></i>
      </button>
      <button class="play-btn" id="playBtn">
        <i class="ti ti-player-play" id="playIcon"></i>
      </button>
      <button class="ctrl-btn" id="nextBtn" title="Próxima">
        <i class="ti ti-player-skip-forward"></i>
      </button>
      <button class="ctrl-btn" id="repeatBtn" title="Repetir">
        <i class="ti ti-repeat"></i>
      </button>
    </div>

    <div class="volume-row">
      <i class="ti ti-volume"></i>
      <input type="range" class="vol-bar" id="volBar" min="0" max="1" step="0.01" value="0.8">
      <i class="ti ti-volume-2"></i>
    </div>
  </div>

  <div class="playlist">
    <div class="playlist-header">Fila de reprodução</div>
    <div class="empty-state" id="emptyState">
      <i class="ti ti-playlist"></i>
      Adicione músicas para começar
    </div>
    <div id="playlistItems"></div>
  </div>

</div>

<audio id="audio"></audio>

<script>
  const audio       = document.getElementById('audio');
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const trackName   = document.getElementById('trackName');
  const trackMeta   = document.getElementById('trackMeta');
  const playBtn     = document.getElementById('playBtn');
  const playIcon    = document.getElementById('playIcon');
  const prevBtn     = document.getElementById('prevBtn');
  const nextBtn     = document.getElementById('nextBtn');
  const shuffleBtn  = document.getElementById('shuffleBtn');
  const repeatBtn   = document.getElementById('repeatBtn');
  const progressBar = document.getElementById('progressBar');
  const currentTimeEl = document.getElementById('currentTime');
  const durationEl  = document.getElementById('duration');
  const volBar      = document.getElementById('volBar');
  const playlistItems = document.getElementById('playlistItems');
  const emptyState  = document.getElementById('emptyState');

  let tracks = [];
  let currentIndex = -1;
  let shuffle = false;
  let repeat  = false;
  let isPlaying = false;

  /* ── Helpers ── */
  function fmt(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function fileSize(bytes) {
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  /* ── Adicionar arquivos ── */
  function addFiles(files) {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('audio/')) return;
      tracks.push({
        name: file.name.replace(/\.[^/.]+$/, ''),
        url:  URL.createObjectURL(file),
        size: fileSize(file.size),
        dur:  '—'
      });
    });
    renderPlaylist();
    if (currentIndex === -1 && tracks.length > 0) loadTrack(0);
  }

  /* ── Renderizar playlist ── */
  function renderPlaylist() {
    playlistItems.innerHTML = '';
    emptyState.style.display = tracks.length ? 'none' : 'block';

    tracks.forEach((t, i) => {
      const div = document.createElement('div');
      div.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
      div.innerHTML = `
        <span class="item-num">
          ${i === currentIndex && isPlaying
            ? '<i class="ti ti-volume-2" style="font-size:13px"></i>'
            : i + 1}
        </span>
        <div class="item-info">
          <div class="item-name">${t.name}</div>
        </div>
        <span class="item-dur">${t.dur}</span>
        <button class="item-remove" data-i="${i}" title="Remover">
          <i class="ti ti-x" style="font-size:14px"></i>
        </button>`;

      div.addEventListener('click', e => {
        const removeBtn = e.target.closest('.item-remove');
        if (removeBtn) {
          removeTrack(parseInt(removeBtn.dataset.i));
        } else {
          loadTrack(i);
          audio.play();
        }
      });

      playlistItems.appendChild(div);
    });
  }

  /* ── Carregar faixa ── */
  function loadTrack(index) {
    if (index < 0 || index >= tracks.length) return;
    currentIndex  = index;
    audio.src     = tracks[index].url;
    audio.volume  = parseFloat(volBar.value);
    trackName.textContent = tracks[index].name;
    trackMeta.textContent = tracks[index].size;
    renderPlaylist();
  }

  /* ── Remover faixa ── */
  function removeTrack(i) {
    URL.revokeObjectURL(tracks[i].url);
    tracks.splice(i, 1);

    if (i === currentIndex) {
      audio.pause();
      isPlaying = false;
      updatePlayIcon();
      if (tracks.length > 0) {
        currentIndex = Math.min(i, tracks.length - 1);
        loadTrack(currentIndex);
      } else {
        currentIndex = -1;
        trackName.textContent = 'Nenhuma música carregada';
        trackMeta.textContent = '—';
        progressBar.value = 0;
        currentTimeEl.textContent = '0:00';
        durationEl.textContent    = '0:00';
      }
    } else if (i < currentIndex) {
      currentIndex--;
    }
    renderPlaylist();
  }

  /* ── Ícone play/pause ── */
  function updatePlayIcon() {
    playIcon.className = isPlaying ? 'ti ti-player-pause' : 'ti ti-player-play';
  }

  /* ── Controles ── */
  playBtn.addEventListener('click', () => {
    if (!tracks.length) return;
    if (currentIndex === -1) loadTrack(0);
    isPlaying ? audio.pause() : audio.play();
  });

  prevBtn.addEventListener('click', () => {
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    if (currentIndex > 0) { loadTrack(currentIndex - 1); if (isPlaying) audio.play(); }
  });

  nextBtn.addEventListener('click', () => {
    const next = shuffle
      ? Math.floor(Math.random() * tracks.length)
      : currentIndex + 1 < tracks.length ? currentIndex + 1 : currentIndex;
    loadTrack(next);
    if (isPlaying) audio.play();
  });

  shuffleBtn.addEventListener('click', () => {
    shuffle = !shuffle;
    shuffleBtn.querySelector('i').classList.toggle('active-icon', shuffle);
  });

  repeatBtn.addEventListener('click', () => {
    repeat = !repeat;
    repeatBtn.querySelector('i').classList.toggle('active-icon', repeat);
  });

  /* ── Eventos de áudio ── */
  audio.addEventListener('play',  () => { isPlaying = true;  updatePlayIcon(); renderPlaylist(); });
  audio.addEventListener('pause', () => { isPlaying = false; updatePlayIcon(); renderPlaylist(); });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    progressBar.value = (audio.currentTime / audio.duration) * 100;
    currentTimeEl.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    durationEl.textContent = fmt(audio.duration);
    tracks[currentIndex].dur = fmt(audio.duration);
    renderPlaylist();
  });

  audio.addEventListener('ended', () => {
    if (repeat) { audio.play(); return; }
    if (shuffle) {
      loadTrack(Math.floor(Math.random() * tracks.length));
      audio.play();
    } else if (currentIndex < tracks.length - 1) {
      loadTrack(currentIndex + 1);
      audio.play();
    } else {
      isPlaying = false;
      updatePlayIcon();
      renderPlaylist();
    }
  });

  /* ── Progresso e volume ── */
  progressBar.addEventListener('input', () => {
    if (!audio.duration) return;
    audio.currentTime = (progressBar.value / 100) * audio.duration;
  });

  volBar.addEventListener('input', () => {
    audio.volume = parseFloat(volBar.value);
  });

  /* ── Drag & Drop / seletor ── */
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => addFiles(fileInput.files));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });
</script>

</body>
</html>
